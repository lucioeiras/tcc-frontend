version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://test:test@postgres:5432/testdb
    depends_on:
      - postgres