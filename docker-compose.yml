version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: financeiro-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeiro-network
    restart: unless-stopped
    
  app:
    build: .
    container_name: tcc-backend-app
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - financeiro-network
    restart: unless-stopped
    
networks:
  financeiro-network:
    driver: bridge

volumes:
  postgres_data: